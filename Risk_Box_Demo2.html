<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Risk Box 連續行為分析引擎 Demo</title>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}
.section{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
button{
    padding:8px 14px;
    margin:5px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #334155;
    padding:6px;
    text-align:center;
}
input,select,textarea{
    padding:6px;
    margin:4px;
}
</style>
</head>

<body>

<h2>
Risk Box – 真正多筆連續行為分析引擎<br>
（銀行簡報展示版）
</h2>

<div class="section">
<h3>① 單筆交易測試</h3>
金額 <input id="amount"><br>
地點 
<select id="location">
<option>台灣</option>
<option>新加坡</option>
<option>香港</option>
</select><br>
IP <input id="ip"><br>
<button onclick="confirmData()">確認資料</button>
<button onclick="runRisk()">啟動 Risk 分析</button>
</div>

<div class="section">
<h3>② 分析結果</h3>
<div id="compareBox"></div>
</div>

<div class="section">
<h3>③ 信心指數（銀行喜歡）</h3>
<div id="confidenceText"></div>
<div style="background:#334155;height:20px;border-radius:10px;">
<div id="confidenceBar" style="height:20px;width:0%;background:#22c55e;border-radius:10px;"></div>
</div>
<div id="confidenceExplain" style="margin-top:10px;font-size:13px;"></div>
</div>

<div class="section">
<h3>④ 多筆連續詐騙洗錢模擬</h3>
<button onclick="simulateBatch()">模擬 12 筆連續搬空</button>
<table id="resultTable"></table>
</div>

<div class="section">
<h3>⑤ 系統 Log</h3>
<div id="logBox" style="font-size:12px;"></div>
</div>

<script>

let currentData=null;
let previousRisk=0;
let accountBalance=300000;

function log(msg){
    document.getElementById("logBox").innerHTML += 
    new Date().toLocaleTimeString()+" - "+msg+"<br>";
}

function confirmData(){
    currentData={
        amount: parseFloat(document.getElementById("amount").value),
        location: document.getElementById("location").value,
        ip: document.getElementById("ip").value
    };
    log("確認單筆交易資料");
}

function runRisk(){

    if(!currentData){ alert("請先確認資料"); return;}

    let risk=0;
    let hit=0;

    // 金額特徵
    if(currentData.amount>80000){
        risk+=30;
        hit++;
    }

    // 跨境特徵
    if(currentData.location!=="台灣"){
        risk+=20;
        hit++;
    }

    // IP 異常
    if(currentData.ip.startsWith("10.") || currentData.ip.startsWith("192.")){
        risk+=25;
        hit++;
    }

    if(risk>100) risk=100;

    let decision;
    if(risk>=80) decision="建議人工查核";
    else if(risk>=40) decision="建議OTP驗證";
    else decision="正常交易";

    document.getElementById("compareBox").innerHTML=
    "無 Risk Box：直接核准<br>"+
    "有 Risk Box："+decision+"<br>"+
    "風險分數："+risk;

    // 信心指數 = 命中特徵比例 + 強特徵加權
    let confidence=Math.floor((hit/3)*70);
    if(risk>=80) confidence+=20;
    if(confidence>100) confidence=100;

    document.getElementById("confidenceText").innerHTML=
    "Confidence Index："+confidence+"%";

    document.getElementById("confidenceBar").style.width=
    confidence+"%";

    if(confidence>70)
        document.getElementById("confidenceBar").style.background="#ef4444";
    else if(confidence>40)
        document.getElementById("confidenceBar").style.background="#f59e0b";
    else
        document.getElementById("confidenceBar").style.background="#22c55e";

    let explain;
    if(confidence<40)
        explain="低風險。符合一般客戶行為輪廓。";
    else if(confidence<70)
        explain="中度異常。建議加強驗證。";
    else
        explain="高度異常。多特徵高度吻合詐騙模型。";

    document.getElementById("confidenceExplain").innerHTML=explain;

    log("完成單筆風險分析");
}

function simulateBatch(){

    accountBalance=300000;
    previousRisk=0;

    let output="<tr><th>筆</th><th>金額</th><th>餘額</th><th>單筆風險</th><th>累積風險</th></tr>";

    for(let i=1;i<=12;i++){

        let amount=15000+(i*5000);
        if(amount>accountBalance) break;

        accountBalance-=amount;

        let singleRisk=0;

        if(i>=2) singleRisk+=15;               // 連續行為
        if(amount>40000) singleRisk+=20;       // 大額
        if(accountBalance<150000) singleRisk+=25; // 餘額下降
        if(i>=6) singleRisk+=15;               // 持續搬空

        // 連續行為衰減模型
        let cumulative=Math.floor(previousRisk*0.75 + singleRisk);

        if(cumulative>100) cumulative=100;
        previousRisk=cumulative;

        output+="<tr>"+
        "<td>"+i+"</td>"+
        "<td>"+amount+"</td>"+
        "<td>"+accountBalance+"</td>"+
        "<td>"+singleRisk+"</td>"+
        "<td style='color:"+(cumulative>70?"#ef4444":"#f59e0b")+"'>"+cumulative+"</td>"+
        "</tr>";
    }

    document.getElementById("resultTable").innerHTML=output;
    log("啟動連續詐騙洗錢模擬");
}

</script>

</body>
</html>

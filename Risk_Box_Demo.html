<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Risk Box 決策模擬系統</title>
<style>
body { background: #050b14; color: #ffffff; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
.container { max-width: 1200px; margin: auto; }
.flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
.panel { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; flex: 1; }
.title { color: #00d4ff; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; border-left: 5px solid #00d4ff; padding-left: 10px; }
button { background: #00d4ff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 4px; }
select, input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 100%; margin-bottom: 10px; border-radius: 4px; }
pre { background: #000; padding: 15px; border: 1px solid #333; color: #00ffcc; font-size: 12px; height: 100px; overflow: auto; }
.log { background: #000; color: #00ffcc; height: 150px; overflow-y: scroll; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #333; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #444; padding: 10px; text-align: left; }
th { background: #222; color: #00d4ff; }
.red { color: #ff4d4f; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<h1>RISK BOX | 決策模擬系統</h1>
<p style="color: #888;">對應功能：三維決策融合、風險權值化、Event Level 輸出</p>

</body>
</html>

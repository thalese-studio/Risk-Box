<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<style>
body { background: #050b14; color: #fff; font-family: sans-serif; padding: 20px; }
.panel { background: #1a1a1a; border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
.log { background: #000; color: #00ffcc; height: 180px; overflow-y: scroll; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #333; }
.btn { background: #00d4ff; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
.btn-list { background: #444; color: #fff; border: 1px solid #666; width: 32%; font-size: 12px; }
.flex { display: flex; gap: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
td, th { border: 1px solid #444; padding: 8px; }
.red { color: #ff4d4f; }
.green { color: #35d07f; }
</style>
</head>
<body>
<div class="flex">
<div class="panel" style="width: 30%;">
<b>1. 情境選擇</b>

<select id="scSelect" onchange="loadS()" style="width:100%; padding: 8px; margin-top:10px;">
<option value="n">正常交易</option>
<option value="m">人頭戶 (洗錢)</option>
<option value="f">複合式詐騙</option>
<option value="q">584qu04 (高頻搬空)</option>
</select>




金額: <input type="number" id="amt" value="3000" style="width:70%;">




<button class="btn" onclick="gen()">產出模擬資料</button>
</div>

<div class="panel" style="width: 40%;" id="mUI" hidden>
<b>2. 名單與評估</b>



<div style="margin-top:10px;">
<button class="btn btn-list" onclick="setM('W')">白名單</button>
<button class="btn btn-list" onclick="setM('B')">黑名單</button>
<button class="btn btn-list" onclick="setM('P')">保護</button>
</div>
<div id="mStatus" style="text-align:center; font-size:12px; margin:5px;"></div>
<button class="btn" style="background:#35d07f;" onclick="runR()">啟動 Risk Box 運作</button>
</div>
</div>

<div class="flex">
<div class="panel" style="width: 50%;">
<b>報文串流 (ISO-8583 / 20022)</b>
<div id="pS" style="margin-top:10px; padding:10px; background:#000; font-family:monospace; font-size:12px; border:1px solid #333;">- 等待中 -</div>
</div>

<div class="panel" style="width: 50%;">
<b>決策比較表</b>
<table id="cT" hidden>
<thead><tr><th>項目</th><th>傳統風控</th><th class="green">Risk Box</th></tr></thead>
<tbody id="cB"></tbody>
</table>
</div>
</div>

<div class="panel">
<b>System Runtime Log</b>
<div id="log" class="log">系統初始化中...</div>
</div>
<script>
let sT = 'N';
let uIP = '114.34.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255);
const dS = {
n: { a: 3200, r: 10, f: '信任裝置', l: 0 },
m: { a: 158000, r: 85, f: '入即出行為', l: 3 },
f: { a: 45000, r: 75, f: '異常環境/VPN', l: 2 },
q: { a: 950, r: 95, f: '584qu04:高頻搬空', l: 3 }
};

</script>
</body>
</html>

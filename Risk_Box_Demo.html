<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Risk Box 專業風控模擬器</title>
<style>
body { background: #050b14; color: #fff; font-family: "Microsoft JhengHei", sans-serif; padding: 30px; line-height: 1.6; }
.container { max-width: 1000px; margin: auto; }
.flex-row { display: flex; gap: 20px; margin-bottom: 20px; }
.panel { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 20px; border-radius: 12px; flex: 1; }
.title { color: #00d4ff; font-weight: bold; border-left: 4px solid #00d4ff; padding-left: 10px; margin-bottom: 15px; }
select, input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 100%; border-radius: 4px; margin-bottom: 10px; }
button { background: #00d4ff; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 4px; transition: 0.3s; }
button:hover { background: #00b8e6; }
.log-box { background: #000; color: #00ffcc; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; padding: 15px; border: 1px solid #333; margin-top: 10px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.3); }
th, td { border: 1px solid #444; padding: 12px; text-align: left; font-size: 14px; }
th { background: rgba(0,212,255,0.1); color: #00d4ff; }
.red { color: #ff4d4f; font-weight: bold; }
.green { color: #35d07f; }
pre { background: #000; padding: 15px; border: 1px solid #444; color: #00d4ff; font-size: 12px; border-radius: 8px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="container">
<h1>RISK BOX | 決策模擬系統</h1>
<p style="color: #888;">對應功能：三維決策融合、風險權值化、Event Level 輸出</p>

</body>
</html>
